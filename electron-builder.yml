appId: com.atendepro.desktop
productName: AtendePro
directories:
  output: dist-desktop
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
files:
  - electron/**/*
  - public/**/*
  - package.json
asar: true
extraMetadata:
  main: electron/main.cjs
linux:
  target:
    - AppImage
  category: Utility
mac:
  target:
    - dmg
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/brand/atendepro-icon-512.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AtendePro
