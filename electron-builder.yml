appId: com.atendepro.desktop
productName: AtendePro Desktop
directories:
  output: dist-desktop
files:
  - electron/**/*
  - .next/**/*
  - public/**/*
  - package.json
  - node_modules/**/*
asar: true
linux:
  target:
    - AppImage
  category: Utility
mac:
  target:
    - dmg
win:
  target:
    - nsis