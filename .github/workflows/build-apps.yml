name: Build desktop and Android apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-desktop:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run desktop:package:win
      - name: Normalize installer name
        shell: pwsh
        run: |
          $target = "dist-desktop/AtendePro-0.1.0-win-x64.exe"
          $installer = Get-ChildItem "dist-desktop" -Filter "*.exe" | Select-Object -First 1
          if ($installer.FullName -ne (Resolve-Path $target -ErrorAction SilentlyContinue)) {
            Copy-Item $installer.FullName $target -Force
          }
      - uses: actions/upload-artifact@v4
        with:
          name: AtendePro-Windows
          path: dist-desktop/AtendePro-0.1.0-win-x64.exe
      - name: Publish Windows installer
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --title "AtendePro ${{ github.ref_name }}" --notes "Instaladores do AtendePro para Windows e Android."
          }
          gh release upload "${{ github.ref_name }}" "dist-desktop/AtendePro-0.1.0-win-x64.exe" --clobber

  android-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - run: npm install
      - run: npx capacitor add android
        if: ${{ hashFiles('android/build.gradle') == '' }}
      - run: npx capacitor sync android
      - run: chmod +x android/gradlew
      - name: Verify Android build environment
        run: |
          if [ -n "$JAVA_HOME_21_X64" ]; then
            export JAVA_HOME="$JAVA_HOME_21_X64"
            export PATH="$JAVA_HOME/bin:$PATH"
          fi
          java -version
          ./gradlew --version
        working-directory: android
      - name: Build Android APK
        id: android_build
        run: |
          if [ -n "$JAVA_HOME_21_X64" ]; then
            export JAVA_HOME="$JAVA_HOME_21_X64"
            export PATH="$JAVA_HOME/bin:$PATH"
          fi
          set +e
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee ../android-build.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
        working-directory: android
      - run: |
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/AtendePro-Android-debug.apk
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AtendePro-Android-debug-apk
          path: android/app/build/outputs/apk/debug/AtendePro-Android-debug.apk
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-build-log
          path: android-build.log
          if-no-files-found: ignore
      - name: Publish Android APK
        if: always() && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --title "AtendePro $GITHUB_REF_NAME" --notes "Instaladores do AtendePro para Windows e Android."
          if [ -f android-build.log ]; then
            gh release upload "$GITHUB_REF_NAME" android-build.log --clobber
          fi
          if [ -f android/app/build/outputs/apk/debug/AtendePro-Android-debug.apk ]; then
            gh release upload "$GITHUB_REF_NAME" android/app/build/outputs/apk/debug/AtendePro-Android-debug.apk --clobber
          fi
      - name: Fail Android job when APK build fails
        if: steps.android_build.outputs.status != '0'
        run: exit 1
